<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Learn Analog Circuits</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: white;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 40px;
            background-color: #f5f5f5;
        }

        .navbar h2 {
            margin: 0;
        }

        .navbar button {
            padding: 8px 15px;
            border: none;
            background-color: black;
            color: white;
            cursor: pointer;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 100px 20px;
        }

        .hero h1 {
            font-size: 40px;
        }

        .hero p {
            font-size: 18px;
            color: gray;
        }

        .hero button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: black;
            color: white;
            border: none;
            cursor: pointer;
        }

        /* Form Section */
        .form-container {
            display: none;
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .form-container h3 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
        }

        .form-container button {
            width: 100%;
            padding: 10px;
            background-color: black;
            color: white;
            border: none;
        }

        .error {
            color: red;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <h2>Analog Learning</h2>
        <button onclick="showForm()">Register</button>
    </div>

    <!-- Hero Section -->
    <div class="hero">
        <h1>Learn Analog Circuits</h1>
        <p>Start your journey into electronics and circuit design</p>
        <button onclick="showForm()">Get Started</button>
    </div>

    <!-- Register Form -->
    <div class="form-container" id="form">
        <h3>Register</h3>

        <input type="email" id="email" placeholder="Enter Email">
        <div class="error" id="emailError"></div>

        <input type="password" id="password" placeholder="Enter Password">
        <div class="error" id="passError"></div>

        <button onclick="register()">Submit</button>
    </div>

    <script>
        function showForm() {
            document.getElementById("form").style.display = "block";
            window.scrollTo(0, document.body.scrollHeight);
        }

        function register() {
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;

            let emailError = document.getElementById("emailError");
            let passError = document.getElementById("passError");

            emailError.innerText = "";
            passError.innerText = "";

            let valid = true;

            // Email validation
            if (!email.includes("@") || !email.includes(".")) {
                emailError.innerText = "Enter valid email";
                valid = false;
            }

            // Password validation
            if (password.length < 6) {
                passError.innerText = "Password must be at least 6 characters";
                valid = false;
            }

            if (valid) {
                alert("Registered Successfully!");
            }
        }
    </script>

</body>
</html>
